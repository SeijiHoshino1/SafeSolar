services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: safesolar
      POSTGRES_USER: safesolar
      POSTGRES_PASSWORD: safesolar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safesolar -d safesolar"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/safesolar
      DB_USER: safesolar
      DB_PASSWORD: safesolar
    ports:
      - "${API_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
