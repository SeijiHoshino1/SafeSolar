spring:
  application:
    name: safesolar-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/safesolar}
    username: ${DB_USER:safesolar}
    password: ${DB_PASSWORD:safesolar}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

info:
  app:
    name: SafeSolar API
    version: 1.0.0
